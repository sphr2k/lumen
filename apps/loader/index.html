<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lumen Verified Launch</title>
    <script type="module" src="./src/main.ts"></script>
  </head>
  <body>
    <main>
      <section class="panel">
        <div class="brand">
          <span class="mark" aria-hidden="true"></span>
          <span class="eyebrow">Lumen</span>
        </div>
        <div id="status-icon" class="status-icon" aria-hidden="true"></div>
        <h1 id="status-title">Preparing verified launch</h1>
        <p id="status-message" class="copy">Lumen is checking the signed bundle before the app opens.</p>
        <p id="status-meta" class="meta">No app bytes are loaded until the bundle digest and release asset hashes match.</p>
        <div class="actions">
          <button id="launch" type="button" hidden>Verify and launch</button>
          <button id="verify" type="button" hidden>Verify only</button>
          <button id="retry" type="button" hidden>Retry</button>
        </div>
        <details id="details" class="details">
          <summary>Advanced verification details</summary>
          <form id="verify-form">
            <label>
              Source URL
              <input id="source" name="source" placeholder="https://gateway.example/ipfs/bafy.../" />
            </label>
            <label>
              Bundle digest
              <input id="bundleDigest" name="bundleDigest" placeholder="sha256:..." />
            </label>
            <label>
              Release manifest path
              <input id="releasePath" name="releasePath" placeholder="releases/1.0.0/manifest.json" />
            </label>
            <label>
              Runtime path
              <input id="runtimePath" name="runtimePath" placeholder="runtime/reference.json" />
            </label>
          </form>
          <ol id="timeline" class="timeline" aria-live="polite"></ol>
          <pre id="output">Waiting for a Lumen link...</pre>
        </details>
      </section>
    </main>
  </body>
</html>
